name: strict-guest-candidate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Refuse an unreviewed release configuration
        run: python3 vm/guest/release.py release-readiness
      - name: Prepare bounded disposable work volume
        run: |
          volume="leftovers-guest-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          docker volume create --driver local --opt type=tmpfs --opt device=tmpfs \
            --opt o=size=6g,nosuid,nodev "$volume"
          printf 'LEFTOVERS_GUEST_VOLUME=%s\n' "$volume" >> "$GITHUB_ENV"
      - name: Fetch only locked inputs in the disposable builder
        run: |
          image=$(python3 vm/guest/release.py builder-image)
          docker pull -- "$image"
          docker run --rm --network bridge --read-only --cap-drop ALL --cpus=2 \
            --memory=2g --memory-swap=2g --pids-limit=256 \
            --security-opt no-new-privileges=true --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --mount type=bind,src="$GITHUB_WORKSPACE",dst=/workspace,readonly \
            --mount type=volume,src="$LEFTOVERS_GUEST_VOLUME",dst=/work,volume-nocopy \
            "$image" \
            /workspace/vm/guest/ci/build-in-container.sh fetch
      - name: Build with network disabled
        run: |
          image=$(python3 vm/guest/release.py builder-image)
          docker run --rm --network none --read-only --cap-drop ALL --cpus=2 \
            --memory=2g --memory-swap=2g --pids-limit=256 \
            --security-opt no-new-privileges=true --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --mount type=bind,src="$GITHUB_WORKSPACE",dst=/workspace,readonly \
            --mount type=volume,src="$LEFTOVERS_GUEST_VOLUME",dst=/work,volume-nocopy \
            "$image" \
            /workspace/vm/guest/ci/build-in-container.sh build
      - name: Remove and verify bounded work volume
        if: always()
        run: |
          test -n "${LEFTOVERS_GUEST_VOLUME:-}" || exit 0
          docker volume rm --force "$LEFTOVERS_GUEST_VOLUME"
          ! docker volume inspect "$LEFTOVERS_GUEST_VOLUME" >/dev/null 2>&1
